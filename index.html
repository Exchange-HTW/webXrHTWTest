<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laboratorio NeuroVR</title>

    <script src="https://aframe.io/releases/1.7.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.5.0/dist/aframe-extras.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <a-scene>
        <a-assets>
            <video id="video-asset" src="assets/videos/Crimson%20Memories.mp4" playsinline></video>
            <!-- Usamos el mismo video como placeholder para el 360 por ahora -->
            <video id="video-360-asset" src="assets/videos/Crimson%20Memories.mp4" playsinline loop></video>
        </a-assets>

        <a-entity id="entorno-principal">
            <!-- ========== FONDO ESPACIAL ========== -->
            <a-sky color="#0a0a2e"></a-sky>

            <!-- Estrellas -->
            <a-entity position="0 0 0" particle-system="
                preset: dust;
                particleCount: 1200;
                maxParticleSize: 0.06;
                color: #ffffff,#ccddff,#ffeedd;
                distribution: sphere;
                radius: 35;
            "></a-entity>

            <!-- ========== ILUMINACIÓN ========== -->
            <a-light type="ambient" intensity="0.4" color="#8899cc"></a-light>
            <a-light type="point" intensity="1.0" color="#6644cc" position="0 4 0"></a-light>
            <a-light type="point" intensity="0.6" color="#ff66aa" position="-2 2 2"></a-light>
            <!-- Luz extra para el cuarto cerebro -->
            <a-light type="point" intensity="0.8" color="#aaddff" position="0 4 35"></a-light>

            <!-- ========== MUNDO FLOTANTE (Fondo) ========== -->
            <a-entity id="mundo-flotante" position="0 10 -40">
                <!-- Moviendo el CEREBRO HOLOGRÁFICO al fondo -->
                <a-entity id="cerebro" position="0 0 0">
                    <a-sphere radius="5" color="#8844ff"
                        material="wireframe: true; color: #8844ff; emissive: #4422aa; emissiveIntensity: 0.4; transparent: true; opacity: 0.7;"></a-sphere>
                    <a-sphere id="cerebro-medio" radius="4" color="#aa55ff"
                        material="wireframe: true; color: #aa55ff; emissive: #5522aa; emissiveIntensity: 0.5; transparent: true; opacity: 0.7;"></a-sphere>
                    <a-sphere id="cerebro-chico" radius="3" color="#cc66ff"
                        material="wireframe: true; color: #cc66ff; emissive: #6622aa; emissiveIntensity: 0.6; transparent: true; opacity: 0.8;"></a-sphere>
                    <a-sphere radius="1" color="#ff88ff"
                        material="emissive: #ff88ff; emissiveIntensity: 2; shader: flat;"></a-sphere>
                    <a-entity
                        particle-system="particleCount: 150; maxParticleSize: 0.3; color: #8844ff,#aa55ff,#ff88ff; distribution: sphere; radius: 7; blending: additive; opacity: 0.7; size: 0.1,0.3; duration: 2;"></a-entity>
                    <a-entity
                        particle-system="particleCount: 100; maxParticleSize: 0.2; color: #cc66ff,#ff88ff,#ffaacc; distribution: sphere; radius: 10.0; blending: additive; opacity: 0.4; size: 0.1,0.2; duration: 3;"></a-entity>
                </a-entity>
            </a-entity>

            <!-- ========== PLATAFORMA PRINCIPAL ========== -->
            <a-circle position="0 -0.01 0" rotation="-90 0 0" radius="10" color="#0a0a2e"
                material="shader: flat; color: #0a0a2e;"></a-circle>
            
            <a-ring position="0 0 0" rotation="-90 0 0" radius-inner="9.8" radius-outer="10" color="#4466cc" material="
                emissive: #3344aa;
                emissiveIntensity: 0.6;
                transparent: true;
                opacity: 0.5;
            "></a-ring>

            <a-ring position="0 0 0" rotation="-90 0 0" radius-inner="4.5" radius-outer="4.7" color="#4466cc" material="
                emissive: #3344aa;
                emissiveIntensity: 0.6;
                transparent: true;
                opacity: 0.5;
            "></a-ring>

            <!-- ========== PUENTE FLOTANTE ========== -->
            <!-- Conecta la plataforma principal (z=10) con el cuarto Cerebro (z=35) -->
            <!-- Centro del puente en z = 22.5, longitud = 25 -->
            <a-plane position="0 -0.01 22.5" rotation="-90 0 0" width="3" height="25" color="#0a0a2e"
                material="shader: flat; color: #0a0a2e;"></a-plane>
            
            <!-- Bordes del puente -->
            <a-plane position="-1.5 0 22.5" rotation="-90 0 0" width="0.1" height="25" color="#4466cc"
                material="emissive: #3344aa; emissiveIntensity: 0.6; transparent: true; opacity: 0.5;"></a-plane>
            <a-plane position="1.5 0 22.5" rotation="-90 0 0" width="0.1" height="25" color="#4466cc"
                material="emissive: #3344aa; emissiveIntensity: 0.6; transparent: true; opacity: 0.5;"></a-plane>

            <!-- ========== PANEL DE BIENVENIDA ========== -->
            <a-entity id="panel-bienvenida" position="0 2.8 -3.5">
                <a-plane width="4" height="0.6" color="#ffffff" material="shader: flat; color: #ffffff;"></a-plane>
                <a-plane position="0 0 0.001" width="4" height="0.6"
                    material="shader: flat; src: url(assets/images/titulo.png); transparent: true;"></a-plane>
                <a-plane position="0 0.31 0.002" width="4" height="0.03" color="#6644ff"
                    material="emissive: #6644ff; emissiveIntensity: 1.5; transparent: true; opacity: 0.9;"></a-plane>
                <a-plane position="0 -0.31 0.002" width="4" height="0.03" color="#6644ff"
                    material="emissive: #6644ff; emissiveIntensity: 1.5; transparent: true; opacity: 0.9;"></a-plane>
                <a-entity position="0 0 0.05"
                    particle-system="particleCount: 20; maxParticleSize: 0.015; color: #6644ff,#8866ff; distribution: box; size: 0.005,0.015; blending: additive; opacity: 0.6;"></a-entity>
            </a-entity>



            <!-- ========== PANELES INFORMATIVOS ========== -->
            <a-entity class="panel-info clickable" position="-6.5 2.2 -1.5" rotation="0 50 0">
                <a-plane width="1.8" height="1.2" color="#111133"
                    material="shader: flat; color: #111133; transparent: true; opacity: 0.9;"></a-plane>
                <a-plane position="0 0.61 0.01" width="1.8" height="0.03" color="#55ffcc"
                    material="emissive: #55ffcc; emissiveIntensity: 1.5; transparent: true; opacity: 0.9;"></a-plane>
                <a-text value="SNN-UNIT" position="0 0.35 0.02" align="center" color="#55ffcc" width="1.6"
                    font="roboto"></a-text>
                <a-text value="Systems Neuroscience &" position="0 0.1 0.02" align="center" color="#aaddff" width="1.6"
                    font="roboto"></a-text>
                <a-text value="Neurotechnology Unit" position="0 -0.15 0.02" align="center" color="#8899bb"
                    width="1.6" font="roboto"></a-text>
            </a-entity>

            <a-entity class="panel-info clickable" position="6.0 2.2 -.5" rotation="0 -50 0">
                <a-plane width="1.8" height="1.2" color="#111133"
                    material="shader: flat; color: #111133; transparent: true; opacity: 0.9;"></a-plane>
                <a-plane position="0 0.61 0.01" width="1.8" height="0.03" color="#ff66aa"
                    material="emissive: #ff66aa; emissiveIntensity: 1.5; transparent: true; opacity: 0.9;"></a-plane>
                <a-text value="DIRECTOR" position="0 0.35 0.02" align="center" color="#ff66aa" width="1.6"
                    font="roboto"></a-text>
                <a-text value="Prof. Dr. Dr. Strauss" position="0 0.1 0.02" align="center" color="#ffaacc" width="1.6"
                    font="roboto"></a-text>
                <a-text value="Investigacion interdisciplinaria" position="0 -0.15 0.02" align="center" color="#cc8899"
                    width="1.6" font="roboto"></a-text>
            </a-entity>

            <a-entity class="panel-info clickable" position="-4.5 1.5 2.5" rotation="0 60 0">
                <a-plane width="1.8" height="1.2" color="#111133"
                    material="shader: flat; color: #111133; transparent: true; opacity: 0.9;"></a-plane>
                <a-plane position="0 0.61 0.01" width="1.8" height="0.03" color="#55aaff"
                    material="emissive: #55aaff; emissiveIntensity: 1.5; transparent: true; opacity: 0.9;"></a-plane>
                <a-text value="FOCO CENTRAL" position="0 0.35 0.02" align="center" color="#55aaff" width="1.6"
                    font="roboto"></a-text>
                <a-text value="Atencion Selectiva" position="0 0.1 0.02" align="center" color="#aaccff" width="1.6"
                    font="roboto"></a-text>
                <a-text value="Esfuerzo cognitivo" position="0 -0.15 0.02" align="center" color="#8899cc" width="1.6"
                    font="roboto"></a-text>
            </a-entity>

            <a-entity class="panel-info clickable" position="4.5 1.5 2.5" rotation="0 -60 0">
                <a-plane width="1.8" height="1.2" color="#111133"
                    material="shader: flat; color: #111133; transparent: true; opacity: 0.9;"></a-plane>
                <a-plane position="0 0.61 0.01" width="1.8" height="0.03" color="#ffaa44"
                    material="emissive: #ffaa44; emissiveIntensity: 1.5; transparent: true; opacity: 0.9;"></a-plane>
                <a-text value="TRASLACION" position="0 0.35 0.02" align="center" color="#ffaa44" width="1.6"
                    font="roboto"></a-text>
                <a-text value="De teoria a clinica" position="0 0.1 0.02" align="center" color="#ffccaa" width="1.6"
                    font="roboto"></a-text>
                <a-text value="Neurotecnologia e interfaces" position="0 -0.15 0.02" align="center" color="#ccaa88"
                    width="1.6" font="roboto"></a-text>
            </a-entity>

            <!-- ========== PANTALLA DE VIDEO FLOTANTE ========== -->
            <a-entity id="pantalla-video" position="5 2.5 -3" rotation="0 -30 0">
                <a-plane width="3.2" height="2.0" color="#111133" material="shader: flat; color: #111133;"></a-plane>
                <a-plane position="0 1.01 0.01" width="3.2" height="0.03" color="#ff66aa"
                    material="emissive: #ff66aa; emissiveIntensity: 2; transparent: true; opacity: 0.9;"></a-plane>
                <a-plane position="0 -1.01 0.01" width="3.2" height="0.03" color="#ff66aa"
                    material="emissive: #ff66aa; emissiveIntensity: 2; transparent: true; opacity: 0.9;"></a-plane>
                <a-video id="video-principal"
                    src="#video-asset"
                    width="3" height="1.8" position="0 0 0.01">
                </a-video>
                <a-text value="VIDEO: Crimson Memories" position="0 1.15 0.02" align="center" color="#ffffff" width="3"
                    font="roboto"></a-text>
                <a-entity position="0 0 0.05"
                    particle-system="particleCount: 15; maxParticleSize: 0.015; color: #ff66aa; distribution: box; size: 0.005,0.015; blending: additive; opacity: 0.5;"></a-entity>
            </a-entity>

            <!-- ========== PUBLICACIÓN FLOTANTE ========== -->
            <a-entity id="publicacion" position="-5 2.2 -3" rotation="0 25 0">
                <a-plane width="2.5" height="3.2" color="#1a1a3a"
                    material="shader: flat; color: #1a1a3a; transparent: true; opacity: 0.95;"></a-plane>
                <a-plane position="0 1.61 0.01" width="2.5" height="0.03" color="#bb55ff"
                    material="emissive: #bb55ff; emissiveIntensity: 2; transparent: true; opacity: 0.9;"></a-plane>
                <a-text value="NEUROSCIENCE" position="0 1.3 0.02" align="center" color="#bb55ff" width="2.2"
                    font="roboto"></a-text>
                <a-text value="REVIEW" position="0 1.05 0.02" align="center" color="#ddbbff" width="2.2"
                    font="roboto"></a-text>
                <a-plane position="0 0.8 0.01" width="2" height="0.01" color="#bb55ff"
                    material="emissive: #bb55ff; emissiveIntensity: 1;"></a-plane>
                <a-text value="Avances recientes en" position="0 0.55 0.02" align="center" color="#aabbcc" width="2.2"
                    font="roboto"></a-text>
                <a-text value="interfaces cerebro-" position="0 0.35 0.02" align="center" color="#aabbcc" width="2.2"
                    font="roboto"></a-text>
                <a-text value="computadora (BCI)" position="0 0.15 0.02" align="center" color="#aabbcc" width="2.2"
                    font="roboto"></a-text>
                <a-text value="permiten comunicacion" position="0 -0.05 0.02" align="center" color="#aabbcc" width="2.2"
                    font="roboto"></a-text>
                <a-text value="directa entre neuronas" position="0 -0.25 0.02" align="center" color="#aabbcc" width="2.2"
                    font="roboto"></a-text>
                <a-text value="y dispositivos digitales." position="0 -0.45 0.02" align="center" color="#aabbcc" width="2.2"
                    font="roboto"></a-text>
                <a-plane position="0 -0.7 0.01" width="2" height="0.01" color="#bb55ff"
                    material="emissive: #bb55ff; emissiveIntensity: 1;"></a-plane>
                <a-text value="DOI: 10.0000/neuro.2026" position="0 -0.9 0.02" align="center" color="#667788" width="2.2"
                    font="roboto"></a-text>
                <a-entity position="0 0 0.05"
                    particle-system="particleCount: 12; maxParticleSize: 0.012; color: #bb55ff; distribution: box; size: 0.005,0.012; blending: additive; opacity: 0.5;"></a-entity>
            </a-entity>

            <!-- ========== CUARTO CEREBRO ========== -->
            <a-entity id="cuarto-cerebro" position="0 0 35">
                <!-- Piso del cuarto -->
                <a-circle position="0 -0.01 0" rotation="-90 0 0" radius="6" color="#111122"
                    material="shader: flat; color: #111122;"></a-circle>
                
                <a-ring position="0 0 0" rotation="-90 0 0" radius-inner="5.8" radius-outer="6" color="#55aaff" material="
                    emissive: #3388ff;
                    emissiveIntensity: 0.8;
                "></a-ring>

                <!-- Pared cilíndrica tecnológica -->
                <a-cylinder radius="6" height="5" position="0 2.5 0" side="double" open-ended="true" 
                    material="color: #0a0a2e; transparent: true; opacity: 0.7; wireframe: true;"></a-cylinder>

                <a-cylinder radius="6.1" height="5" position="0 2.5 0" side="double" open-ended="true" 
                    material="color: #112244; transparent: true; opacity: 0.3;"></a-cylinder>

                <!-- Silla en el centro -->
                <a-entity id="silla-cerebro" position="0 0 0">
                    <!-- Base de la silla -->
                    <a-box position="0 0.3 0" width="0.8" height="0.6" depth="0.8" color="#333344"
                        material="emissive: #111122; emissiveIntensity: 0.5"></a-box>
                    <!-- Respaldo -->
                    <a-box position="0 1.0 0.35" width="0.8" height="0.8" depth="0.1" color="#333344"
                        material="emissive: #111122; emissiveIntensity: 0.5"></a-box>
                    <!-- Reposabrazos -->
                    <a-box position="-0.45 0.7 0" width="0.1" height="0.2" depth="0.8" color="#445577"></a-box>
                    <a-box position="0.45 0.7 0" width="0.1" height="0.2" depth="0.8" color="#445577"></a-box>
                </a-entity>

                <!-- Pantalla de inicio de película 360 -->
                <a-entity id="panel-360" class="panel-info clickable" position="0 1.5 2.5" rotation="0 180 0">
                    <a-plane width="2.5" height="1.2" color="#111133"
                        material="shader: flat; color: #111133; transparent: true; opacity: 0.9;"></a-plane>
                    <a-plane position="0 0.61 0.01" width="2.5" height="0.03" color="#ffaa44"
                        material="emissive: #ffaa44; emissiveIntensity: 2; transparent: true; opacity: 0.9;"></a-plane>
                    <a-plane position="0 -0.61 0.01" width="2.5" height="0.03" color="#ffaa44"
                        material="emissive: #ffaa44; emissiveIntensity: 2; transparent: true; opacity: 0.9;"></a-plane>
                    <a-text value="INICIAR EXPERIENCIA 360" position="0 0.1 0.02" align="center" color="#ffaa44" width="2.5"
                        font="roboto"></a-text>
                    <a-text value="(Apunta con el laser y usa el gatillo)" position="0 -0.2 0.02" align="center" color="#ffccaa" width="2"
                        font="roboto"></a-text>
                </a-entity>
            </a-entity>
        </a-entity>

        <!-- ========== EXPERIENCIA 360 (Oculta por defecto) ========== -->
        <a-entity id="entorno-360" visible="false">
            <a-videosphere src="#video-360-asset" rotation="0 -90 0"></a-videosphere>
            
            <!-- Botón flotante para salir -->
            <a-entity id="boton-salir-360" class="panel-info clickable" position="0 1.5 -2" rotation="-20 0 0">
                <a-plane width="1.2" height="0.4" color="#551111"
                    material="shader: flat; color: #551111; transparent: true; opacity: 0.9;"></a-plane>
                <a-text value="SALIR 360" position="0 0 0.02" align="center" color="#ff5555" width="2"
                    font="roboto"></a-text>
            </a-entity>
        </a-entity>

        <!-- ========== CÁMARA Y CONTROLES (RIG) ========== -->
        <a-entity id="rig" movement-controls="speed: 0.15;" position="0 0 3">
            <a-camera position="0 1.6 0">
                <a-cursor color="#8899ff" fuse="false" raycaster="objects: .clickable"></a-cursor>
            </a-camera>
            <!-- Mando Izquierdo: Movimiento de caminar con thumbstick-movement -->
            <a-entity laser-controls="hand: left" raycaster="objects: .clickable; lineColor: #ff00ff;" thumbstick-movement="speed: 0.1"></a-entity>
            <!-- Mando Derecho: Rotación de cámara con thumbstick-turn -->
            <a-entity laser-controls="hand: right" raycaster="objects: .clickable; lineColor: #ff00ff;" thumbstick-turn="angle: 45"></a-entity>
        </a-entity>

    </a-scene>

    <script src="script.js"></script>

</body>

</html>

<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laboratorio NeuroVR</title>

    <script src="https://aframe.io/releases/1.7.0/aframe.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <a-scene>

        <!-- Fondo espacial estilo Kurzgesagt -->
        <a-sky color="#0a0a2e"></a-sky>

        <!-- Estrellas -->
        <a-entity position="0 0 0" particle-system="
            preset: dust;
            particleCount: 800;
            maxParticleSize: 0.05;
            color: #ffffff,#ccddff,#ffeedd;
            distribution: sphere;
            radius: 35;
        "></a-entity>

        <!-- Iluminación -->
        <a-light type="ambient" intensity="0.4" color="#8899cc"></a-light>
        <a-light type="point" intensity="1.0" color="#6644cc" position="0 4 0"></a-light>

        <!-- Piso sólido (no wireframe, para bloquear vista inferior) -->
        <a-plane position="0 0 0" rotation="-90 0 0" width="30" height="30" color="#0a0a2e" material="
            shader: flat;
            color: #0a0a2e;
        "></a-plane>

        <!-- Anillo brillante en el piso -->
        <a-ring position="0 0.01 0" rotation="-90 0 0" radius-inner="4.5" radius-outer="4.7" color="#4466cc" material="
            emissive: #3344aa;
            emissiveIntensity: 0.6;
            transparent: true;
            opacity: 0.5;
        "></a-ring>

        <!-- Cámara -->
        <a-camera position="0 1.6 4">
            <a-cursor color="#8899ff" fuse="false" raycaster="objects: .clickable"></a-cursor>
        </a-camera>

    </a-scene>

    <script src="script.js"></script>

</body>

</html>
